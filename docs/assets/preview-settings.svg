    <rect x="320" y="154" width="48" height="22" rx="11" fill="#30363d"/>
    <circle cx="332" cy="165" r="9" fill="#8b949e"/>

    <text x="32" y="214">Уведомления</text>
    <rect x="320" y="202" width="48" height="22" rx="11" fill="#30363d"/>
    <circle cx="332" cy="213" r="9" fill="#8b949e"/>
  </g>

  <line x1="16" y1="88" x2="384" y2="88" stroke="#21262d"/>
  <line x1="16" y1="136" x2="384" y2="136" stroke="#21262d"/>
  <line x1="16" y1="184" x2="384" y2="184" stroke="#21262d"/>

  <text x="200" y="260" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#8b949e">концепт интерфейса — финальный вид может отличаться</text>
