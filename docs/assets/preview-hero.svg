<svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wisp VPN — приватное соединение через защищённые узлы по всему миру">
  <defs>
    <linearGradient id="hero-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <linearGradient id="hero-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="hero-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hero-glow-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bc8cff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#30363d"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="960" height="540" fill="#0d1117"/>
  <rect width="960" height="540" fill="url(#dots)" opacity="0.5"/>
  <circle cx="480" cy="260" r="260" fill="url(#hero-glow)"/>
  <circle cx="760" cy="440" r="200" fill="url(#hero-glow-purple)"/>
  <circle cx="140" cy="90" r="160" fill="url(#hero-glow-purple)" opacity="0.6"/>

  <!-- globe -->
  <g stroke="#30363d" fill="none">
    <circle cx="480" cy="272" r="132"/>
    <ellipse cx="480" cy="272" rx="55" ry="132"/>
    <ellipse cx="480" cy="272" rx="132" ry="55"/>
    <line x1="348" y1="272" x2="612" y2="272"/>
  </g>
  <circle cx="480" cy="272" r="132" fill="none" stroke="url(#hero-grad)" stroke-width="2"/>

  <!-- server nodes on globe with connecting arcs -->
  <g>
    <path d="M400 190 Q480 140 585 205" fill="none" stroke="url(#hero-fade)" stroke-width="2" stroke-dasharray="3 6"/>
    <path d="M390 320 Q470 380 580 330" fill="none" stroke="url(#hero-fade)" stroke-width="2" stroke-dasharray="3 6"/>
    <path d="M420 235 Q480 272 430 340" fill="none" stroke="url(#hero-fade)" stroke-width="2" stroke-dasharray="3 6"/>

    <circle cx="400" cy="190" r="5" fill="#58a6ff"/>
    <circle cx="585" cy="205" r="5" fill="#79c0ff"/>
    <circle cx="390" cy="320" r="5" fill="#bc8cff"/>
    <circle cx="580" cy="330" r="5" fill="#58a6ff"/>
    <circle cx="430" cy="340" r="4" fill="#8b949e"/>
  </g>

  <!-- central lock/shield -->
  <g transform="translate(480 272)">
    <circle r="30" fill="#161b22" stroke="url(#hero-grad)" stroke-width="2"/>
    <path d="M-10 -3 v-6 a10 10 0 0 1 20 0 v6" fill="none" stroke="#c9d1d9" stroke-width="2.4" stroke-linecap="round"/>
    <rect x="-13" y="-3" width="26" height="18" rx="3" fill="#c9d1d9"/>
  </g>

  <!-- scattered floating elements -->

  <!-- shield, top-left -->
  <g transform="translate(110 95) rotate(-12)">
    <circle r="46" fill="url(#hero-glow)"/>
    <path d="M0 -26 L20 -18 V0 C20 14 10 22 0 27 C-10 22 -20 14 -20 0 V-18 Z"
          fill="#161b22" stroke="url(#hero-grad)" stroke-width="2"/>
  </g>

  <!-- key, bottom-left -->
  <g transform="translate(150 452) rotate(18)">
    <circle r="38" fill="url(#hero-glow-purple)"/>
    <circle cx="-14" cy="0" r="10" fill="none" stroke="#c9d1d9" stroke-width="2.4"/>
    <line x1="-4" y1="0" x2="22" y2="0" stroke="#c9d1d9" stroke-width="2.4"/>
    <line x1="14" y1="0" x2="14" y2="8" stroke="#c9d1d9" stroke-width="2.4"/>
    <line x1="22" y1="0" x2="22" y2="8" stroke="#c9d1d9" stroke-width="2.4"/>
  </g>

  <!-- wifi / signal, top-right -->
  <g transform="translate(830 110) rotate(10)">
    <circle r="42" fill="url(#hero-glow)"/>
    <path d="M-18 8 A26 26 0 0 1 18 8" fill="none" stroke="#c9d1d9" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M-11 14 A15 15 0 0 1 11 14" fill="none" stroke="#c9d1d9" stroke-width="2.4" stroke-linecap="round"/>
    <circle cx="0" cy="19" r="2.6" fill="#c9d1d9"/>
  </g>

  <!-- speed gauge, bottom-right -->
  <g transform="translate(815 440) rotate(-8)">
    <circle r="44" fill="url(#hero-glow-purple)"/>
    <path d="M-20 8 A22 22 0 0 1 20 8" fill="none" stroke="#30363d" stroke-width="5" stroke-linecap="round"/>
    <path d="M-20 8 A22 22 0 0 1 10 -18" fill="none" stroke="url(#hero-grad)" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="8" x2="10" y2="-10" stroke="#c9d1d9" stroke-width="2.4" stroke-linecap="round"/>
    <circle cx="0" cy="8" r="3" fill="#c9d1d9"/>
  </g>

  <!-- floating badges -->
  <g font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">
    <g transform="translate(215 175) rotate(-6)">
      <rect x="-52" y="-16" width="104" height="32" rx="16" fill="#161b22" stroke="#30363d"/>
      <text x="0" y="5" text-anchor="middle" fill="#79c0ff">WireGuard</text>
    </g>
    <g transform="translate(748 300) rotate(8)">
      <rect x="-50" y="-16" width="100" height="32" rx="16" fill="#161b22" stroke="#30363d"/>
      <text x="0" y="5" text-anchor="middle" fill="#bc8cff">AES-256</text>
    </g>
    <g transform="translate(300 445) rotate(-4)">
      <rect x="-44" y="-16" width="88" height="32" rx="16" fill="#161b22" stroke="#30363d"/>
      <text x="0" y="5" text-anchor="middle" fill="#3fb950">Без логов</text>
    </g>
    <g transform="translate(690 130) rotate(-10)">
      <rect x="-46" y="-16" width="92" height="32" rx="16" fill="#161b22" stroke="#30363d"/>
      <text x="0" y="5" text-anchor="middle" fill="#c9d1d9">Windows</text>
    </g>
  </g>

  <!-- small padlock accents scattered -->
  <g fill="none" stroke="#8b949e" stroke-width="1.6" opacity="0.7">
    <g transform="translate(600 90)">
      <rect x="-6" y="-1" width="12" height="9" rx="1.5"/>
      <path d="M-3.5 -1 v-3 a3.5 3.5 0 0 1 7 0 v3"/>
    </g>
    <g transform="translate(250 300)">
      <rect x="-6" y="-1" width="12" height="9" rx="1.5"/>
      <path d="M-3.5 -1 v-3 a3.5 3.5 0 0 1 7 0 v3"/>
    </g>
    <g transform="translate(650 420)">
      <rect x="-6" y="-1" width="12" height="9" rx="1.5"/>
      <path d="M-3.5 -1 v-3 a3.5 3.5 0 0 1 7 0 v3"/>
    </g>
  </g>

  <!-- wisp swirl accent sweeping across -->
  <path d="M40 480 C 220 520, 340 430, 480 460 C 620 490, 740 400, 920 60"
        fill="none" stroke="url(#hero-fade)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
