<svg width="400" height="280" viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Экран подключения Wisp VPN (концепт)">
  <defs>
    <linearGradient id="pc-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
  </defs>

  <rect width="400" height="280" fill="#0d1117"/>

  <!-- titlebar -->
  <rect width="400" height="32" fill="#161b22"/>
  <line x1="0" y1="32" x2="400" y2="32" stroke="#21262d"/>
  <circle cx="18" cy="16" r="5" fill="#ff5f56"/>
  <circle cx="36" cy="16" r="5" fill="#ffbd2e"/>
  <circle cx="54" cy="16" r="5" fill="#27c93f"/>
  <text x="200" y="20" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#8b949e">Wisp VPN</text>

  <!-- power button -->
  <circle cx="200" cy="120" r="52" fill="none" stroke="url(#pc-accent)" stroke-width="3" opacity="0.9"/>
  <circle cx="200" cy="120" r="52" fill="none" stroke="url(#pc-accent)" stroke-width="3" opacity="0.25" stroke-dasharray="4 6"/>
  <path d="M200 96 v22" stroke="#c9d1d9" stroke-width="4" stroke-linecap="round"/>
  <path d="M186 104 a24 24 0 1 0 28 0" fill="none" stroke="#c9d1d9" stroke-width="4" stroke-linecap="round"/>

  <text x="200" y="192" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" fill="#8b949e">Отключено</text>

  <!-- server pill -->
  <rect x="130" y="210" width="140" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
  <text x="200" y="230" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#c9d1d9">🇳🇱 Amsterdam · 24 ms</text>

  <!-- connect button -->
  <rect x="140" y="250" width="120" height="22" rx="11" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="200" y="265" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#3fb950">Подключиться</text>
</svg>
