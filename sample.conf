# Пример конфигурации туннеля Wisp VPN (формат WireGuard).
# Это ПЛЕЙСХОЛДЕР для демонстрации — ключи ниже фиктивные и не работают.
# Реальный конфиг вы получите внутри приложения при выборе сервера.

[Interface]
# Приватный ключ вашего устройства (генерируется локально, никуда не отправляется)
PrivateKey = <ВАШ_ПРИВАТНЫЙ_КЛЮЧ_BASE64_PLACEHOLDER>
Address = 10.66.0.2/32
DNS = 1.1.1.1

[Peer]
# Публичный ключ сервера Wisp VPN
PublicKey = <ПУБЛИЧНЫЙ_КЛЮЧ_СЕРВЕРА_BASE64_PLACEHOLDER>
Endpoint = example.wisp-vpn.invalid:51820
AllowedIPs = 0.0.0.0/0, ::/0
PersistentKeepalive = 25
